project_id = "WeatherWatch"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[auth]
enabled = true
site_url = "http://localhost:3000"

# Edge Functions: internal-only, called by pg_cron (via vault service_role
# key) and by poll-weather → evaluate-alerts (via service_role client).
# Neither needs Supabase's user-JWT gateway check — disabling it avoids
# 401 Unauthorized errors on inter-function invocation. Auth is still
# enforced inside the function via the Authorization header if needed
# (and both callers pass the service_role key anyway).

[functions.poll-weather]
verify_jwt = false

[functions.evaluate-alerts]
verify_jwt = false

[functions.register-push-token]
# register-push-token is called from the mobile app with the user's JWT —
# keep JWT verification ON for this one so only authenticated users can
# register a push token against their own profile.
verify_jwt = true

[functions.subscription-webhook]
# Called by RevenueCat servers, not the mobile app.
# Handles its own auth via HMAC-SHA256 X-RevenueCat-Signature header
# (with Bearer token fallback during transition). No Supabase JWT involved.
verify_jwt = false

[functions.delete-account]
# Called from the app with the user's JWT. JWT verification must be ON
# so only the authenticated user can delete their own account.
verify_jwt = true

[functions.send-digest]
# Called by pg_cron with the service_role key (which is a valid JWT).
# The function handles no per-user auth — it reads all profiles internally.
verify_jwt = false

[functions.fcm-keepalive]
# Called by pg_cron with the service_role key. Bearer auth enforced inside
# the function. No Supabase gateway JWT verification needed.
verify_jwt = false

[functions.get-forecast]
# Called by the mobile app with the authenticated user's JWT.
# Supabase gateway validates the JWT before the function runs.
verify_jwt = true

[functions.dev-tier-override]
# Called from the app with the developer account's JWT. verify_jwt = false
# so the function can inspect the JWT itself and enforce the email allowlist.
# The function validates the JWT via userClient.auth.getUser() internally.
verify_jwt = false
