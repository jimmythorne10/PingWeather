# bash-gate.yaml — PingWeather pre-execution gates
# Format: "pattern | check_type | arg1 | arg2 | message"
rules:
  - "eas build | warn | | | versionCode is managed by autoIncrement in eas.json — EAS bumps it automatically. No manual change needed."
  - "eas build | field_nonempty | app.json | revenueCatAndroidApiKey | expo.extra.revenueCatAndroidApiKey is empty. Build will have RevenueCat silently disabled at runtime."
